<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MemPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-layer" id="bgLayer1"></div>
  <div class="bg-layer" id="bgLayer2"></div>
  <!-- Main Card -->
  <main class="card-wrapper">
    <div class="card">

      <h1 class="title">MemPass</h1>
      <p class="subtitle">Turn a word into a secure password</p>

      <div class="input-group">
        <input type="text" id="phraseInput" class="phrase-input" placeholder="Enter a word or phrase..." autocomplete="off" />
        <button class="info-btn" id="infoBtn" aria-label="Info">i</button>
        <div class="tooltip" id="tooltip">Leave empty if no specific word needed</div>
      </div>

      <div class="section">
        <label class="section-label">Password Type</label>
        <div class="type-selector" id="typeSelector">
          <button class="type-btn active" data-type="standard">Standard</button>
          <button class="type-btn" data-type="numbers">Numbers Only</button>
          <button class="type-btn" data-type="letters">Letters Only</button>
        </div>
      </div>

      <div class="section digit-section hidden" id="digitSection">
        <label class="section-label">Number of Digits</label>
        <div class="digit-row">
          <input type="range" id="digitSlider" min="4" max="16" value="6" class="digit-slider"/>
          <span class="digit-count" id="digitCount">6</span>
        </div>
        <div class="digit-labels">
          <span>4</span><span>16</span>
        </div>
      </div>

      <div class="section" id="modeSection">
        <label class="section-label">Mode</label>
        <div class="mode-track">
          <div class="mode-fill" id="modeFill"></div>
          <div class="mode-options" id="modeOptions">
            <button class="mode-btn active" data-mode="easy">Easy</button>
            <button class="mode-btn" data-mode="balanced">Balanced</button>
            <button class="mode-btn" data-mode="strong">Strong</button>
            <button class="mode-btn" data-mode="passphrase">Passphrase</button>
          </div>
        </div>
        <div class="mode-labels">
          <span class="badge badge-easy">Easy</span>
          <span class="badge badge-balanced">Balanced</span>
          <span class="badge badge-strong">Strong</span>
          <span class="badge badge-passphrase">Passphrase</span>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">Generate Password</button>

    </div>
  </main>

  <!-- Popup Overlay -->
  <div class="overlay hidden" id="overlay">
    <div class="popup">
      <h2 class="popup-title">Your Passwords</h2>
      <p class="popup-subtitle">Pick one and copy it</p>
      <div class="suggestions" id="suggestions"></div>
      <button class="generate-again-btn" id="generateAgainBtn">Generate Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
