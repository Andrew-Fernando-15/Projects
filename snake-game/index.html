<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .box {
    background: #16213e;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(0,200,100,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    color: #aaffaa;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  canvas {
    border-radius: 8px;
    display: block;
  }
  .controls {
    color: #556;
    font-size: 12px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #16213e;
    border: 1px solid #2a4a2a;
    border-radius: 16px;
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,200,100,0.2);
    min-width: 260px;
  }
  .modal h2 { color: #fff; font-size: 24px; margin-bottom: 8px; }
  .modal .sub { color: #aaffaa; font-size: 15px; margin-bottom: 6px; }
  .modal .score-line { color: #7fdbff; font-size: 28px; font-weight: 700; margin: 10px 0 24px; }
  .modal button {
    background: #2d7a2d;
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .modal button:hover { background: #3a9e3a; }
</style>
</head>
<body>

<div class="box">
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>⏱ <span id="timer">2:00</span></span>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="controls">Arrow keys / WASD to move</div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Game Over</h2>
    <div class="sub" id="modal-sub">Your score</div>
    <div class="score-line" id="modal-score">0</div>
    <button onclick="tryAgain()">Try Again</button>
  </div>
</div>

<script>
const CELL = 20;
let canvas, ctx, scoreEl, timerEl;
let gameLoop, respawnTimeout, countdownInterval;
let snake, dir, nextDir, food, score, running, gameOver;
let speed, gameStartTime;

const BASE_SPEED = 150, MIN_SPEED = 55, SPEED_STEP = 8, GAME_DURATION = 120;
const C = {
  bg1:'#7ec850', bg2:'#6db542',
  snake:'#3d7a2b', head:'#2d5e1e', outline:'#2a5218',
  food:'#e84040', shine:'#ff7070', stem:'#3d7a2b'
};

function init() {
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');
  scoreEl = document.getElementById('score');
  timerEl = document.getElementById('timer');
  reset();
  document.addEventListener('keydown', onKey);
}

function reset() {
  clearInterval(gameLoop); clearTimeout(respawnTimeout); clearInterval(countdownInterval);
  const cols = canvas.width/CELL, rows = canvas.height/CELL;
  snake = [{x:cols/2|0,y:rows/2|0},{x:cols/2-1|0,y:rows/2|0},{x:cols/2-2|0,y:rows/2|0}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = BASE_SPEED; running = false; gameOver = false; gameStartTime = null;
  scoreEl.textContent = 0;
  timerEl.textContent = '2:00'; timerEl.style.color = '';
  placeFood(); draw();
}

function placeFood() {
  const cols = canvas.width/CELL|0, rows = canvas.height/CELL|0;
  let p;
  do { p = {x:Math.random()*cols|0, y:Math.random()*rows|0}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p;
}

function start() {
  if (running) return;
  running = true; gameStartTime = Date.now();
  clearInterval(gameLoop); gameLoop = setInterval(tick, speed);
  let rem = GAME_DURATION;
  countdownInterval = setInterval(()=>{
    rem--;
    timerEl.textContent = `${rem/60|0}:${(rem%60).toString().padStart(2,'0')}`;
    timerEl.style.color = rem<=15 ? '#ef4444' : '';
    if (rem<=0) { clearInterval(countdownInterval); stop(); gameOver=true; draw(); showModal("TIME'S UP! ⏰","Time ran out",score); }
  }, 1000);
}

function stop() { clearInterval(gameLoop); clearTimeout(respawnTimeout); clearInterval(countdownInterval); running=false; }

function tick() {
  dir = nextDir;
  const cols=canvas.width/CELL|0, rows=canvas.height/CELL|0;
  const head = {x:((snake[0].x+dir.x)+cols)%cols, y:((snake[0].y+dir.y)+rows)%rows};
  if (snake.slice(0,-1).some(s=>s.x===head.x&&s.y===head.y)) {
    stop(); gameOver=true; draw(); showModal('GAME OVER 💀','You hit yourself',score); return;
  }
  snake.unshift(head);
  if (food&&head.x===food.x&&head.y===food.y) {
    score++; scoreEl.textContent=score;
    speed=Math.max(MIN_SPEED,speed-SPEED_STEP);
    clearInterval(gameLoop); gameLoop=setInterval(tick,speed);
    food=null;
    const elapsed=(Date.now()-gameStartTime)/1000;
    respawnTimeout=setTimeout(placeFood, Math.max(0,2000-elapsed*15));
  } else snake.pop();
  draw();
}

function onKey(e) {
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd=map[e.key]; if(!nd) return;
  if(nd.x===-dir.x&&nd.y===-dir.y) return;
  nextDir=nd;
  if(!running&&!gameOver) start();
  e.preventDefault();
}

function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function draw() {
  const cols=canvas.width/CELL|0, rows=canvas.height/CELL|0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    ctx.fillStyle=(r+c)%2===0?C.bg1:C.bg2; ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }
  if(food) {
    const cx=food.x*CELL+CELL/2, cy=food.y*CELL+CELL/2, fr=CELL/2-3;
    ctx.fillStyle=C.food; ctx.beginPath(); ctx.arc(cx,cy+1,fr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.shine; ctx.beginPath(); ctx.arc(cx-fr*0.3,cy-fr*0.2,fr*0.3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=C.stem; ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(cx,cy-fr); ctx.quadraticCurveTo(cx+4,cy-fr-5,cx+2,cy-fr-7); ctx.stroke();
  }
  for(let i=snake.length-1;i>=0;i--) {
    const {x,y}=snake[i],px=x*CELL,py=y*CELL,pad=i===0?1:2,r=i===0?7:6;
    ctx.fillStyle=i===0?C.head:C.snake; ctx.strokeStyle=C.outline; ctx.lineWidth=1.5;
    rr(px+pad,py+pad,CELL-pad*2,CELL-pad*2,r); ctx.fill(); ctx.stroke();
    if(i===0) {
      ctx.fillStyle='white';
      const ex=dir.x===1?px+CELL-7:dir.x===-1?px+4:px+5, ey=dir.y===1?py+CELL-7:dir.y===-1?py+4:py+5;
      const ex2=dir.x!==0?ex:px+CELL-7;
      ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(ex,ey,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey,1.5,0,Math.PI*2);ctx.fill();
    }
  }
  if(!running&&!gameOver) {
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,canvas.height/2-30,canvas.width,60);
    ctx.fillStyle='white'; ctx.font='bold 14px Segoe UI,sans-serif'; ctx.textAlign='center';
    ctx.fillText('Press any arrow key to start',canvas.width/2,canvas.height/2+5);
  }
}

function showModal(title, sub, finalScore) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').textContent = sub;
  document.getElementById('modal-score').textContent = finalScore;
  document.getElementById('modal').classList.add('show');
}

function tryAgain() {
  document.getElementById('modal').classList.remove('show');
  reset();
}

init();
</script>
</body>
</html>
